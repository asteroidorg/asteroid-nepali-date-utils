# cliff.toml
#
# Configuration for git-cliff — generates and prepends new changelog
# sections to CHANGELOG.md on every release.
#
# git-cliff docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""

# commit.description = the part after "feat: " (only exists for conventional commits)
# | default(value=commit.message) = fallback to full message for non-conventional commits
body = """
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.description | default(value=commit.message) | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]\
(https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
sort_commits = "oldest"

commit_parsers = [
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore\\(release\\)",   skip = true },
  { message = "^Merge",                skip = true },

  { message = "^feat",     group = "Features"      },
  { message = "^fix",      group = "Bug Fixes"     },
  { message = "^perf",     group = "Performance"   },
  { message = "^refactor", group = "Refactoring"  },
  { message = "^docs?",    group = "Documentation" },
  { message = "^test",     group = "Tests"         },
  { message = "^build",    group = "Build System"  },
  { message = "^ci",       group = "CI"            },
  { message = "^chore",    group = "Miscellaneous" },
]

tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = "v[0-9]+\\.[0-9]+\\.[0-9]+-"

[remote.github]
owner = "asteroidorg"
repo  = "asteroid-nepali-date-utils"