name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Update package.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync(
              'package.json',
              JSON.stringify(pkg, null, 2) + '\n'
            );
          "

          echo "Updated package.json version to $VERSION"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --verbose --unreleased --tag ${{ github.ref_name }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Insert changelog entry into CHANGELOG.md
        run: |
          cat > /tmp/new_entry.md << 'EOF'
          ${{ steps.changelog.outputs.content }}
          EOF

          heading_line=$(grep -n '^# Changelog' CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$heading_line" ]; then
            echo "::error::No '# Changelog' heading found in CHANGELOG.md"
            exit 1
          fi

          first_ver=$(tail -n +"$heading_line" CHANGELOG.md | grep -n '^## \[' | head -1 | cut -d: -f1)

          if [ -z "$first_ver" ]; then
            cat /tmp/new_entry.md >> CHANGELOG.md
          else
            first_ver=$((heading_line + first_ver - 1))
            head -n $((first_ver - 1)) CHANGELOG.md > /tmp/updated.md
            echo "" >> /tmp/updated.md
            cat /tmp/new_entry.md >> /tmp/updated.md
            echo "" >> /tmp/updated.md
            tail -n +"$first_ver" CHANGELOG.md >> /tmp/updated.md
            mv /tmp/updated.md CHANGELOG.md
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: pnpm publish --ignore-scripts --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Commit CHANGELOG.md back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md unchanged — nothing to commit."
          else
            git add CHANGELOG.md
            git commit -m "chore(changelog): update for ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:refs/heads/main || {
              echo "::warning::Failed to push CHANGELOG.md to main (non-fast-forward or branch moved)."
              echo "::warning::npm publish and GitHub Release for ${{ github.ref_name }} completed successfully."
            }
          fi
