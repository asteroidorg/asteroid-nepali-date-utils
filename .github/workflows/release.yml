name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag points to main
        run: |
          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point to commits on main."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update package.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm version "$VERSION" --no-git-tag-version
          echo "Updated package.json version to $VERSION"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --verbose --unreleased --tag ${{ github.ref_name }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Insert changelog entry into CHANGELOG.md
        run: |
          cat > /tmp/new_entry.md << 'EOF'
          ${{ steps.changelog.outputs.content }}
          EOF

          heading_line=$(grep -n '^# Changelog' CHANGELOG.md | head -1 | cut -d: -f1)

          if [ -z "$heading_line" ]; then
            echo "::error::No '# Changelog' heading found in CHANGELOG.md"
            exit 1
          fi

          first_ver=$(tail -n +"$heading_line" CHANGELOG.md | grep -n '^## \[' | head -1 | cut -d: -f1)

          if [ -z "$first_ver" ]; then
            cat /tmp/new_entry.md >> CHANGELOG.md
          else
            first_ver=$((heading_line + first_ver - 1))

            head -n $((first_ver - 1)) CHANGELOG.md > /tmp/updated.md
            echo "" >> /tmp/updated.md
            cat /tmp/new_entry.md >> /tmp/updated.md
            echo "" >> /tmp/updated.md
            tail -n +"$first_ver" CHANGELOG.md >> /tmp/updated.md

            mv /tmp/updated.md CHANGELOG.md
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: pnpm publish --ignore-scripts --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Commit release metadata back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet package.json CHANGELOG.md; then
            echo "No release metadata changes to commit."
            exit 0
          fi

          git add package.json CHANGELOG.md

          git commit -m "chore(release): prepare ${{ github.ref_name }} [skip ci]"

          git push origin HEAD:refs/heads/main || {
            echo "::warning::Failed to push release metadata to main (non-fast-forward or branch moved)."
            echo "::warning::npm publish and GitHub Release for ${{ github.ref_name }} completed successfully."
          }